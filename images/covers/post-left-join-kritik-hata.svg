<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1672" y2="941" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="1" stop-color="#0B3A45"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1400 150) rotate(90) scale(280 280)">
      <stop stop-color="white" stop-opacity="0.14"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1480 760) rotate(90) scale(360 360)">
      <stop stop-color="white" stop-opacity="0.08"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1672" height="941" fill="url(#bg)"/>
  <rect width="1672" height="941" fill="url(#glow1)"/>
  <rect width="1672" height="941" fill="url(#glow2)"/>

  <rect x="70" y="70" width="1532" height="800" rx="38"
        fill="#071321" fill-opacity="0.74" stroke="rgba(255,255,255,0.12)"/>

  <g opacity="0.10" stroke="white" stroke-width="1">
    <path d="M120 120H1570"/><path d="M120 220H1570"/><path d="M120 320H1570"/>
    <path d="M120 420H1570"/><path d="M120 520H1570"/><path d="M120 620H1570"/>
    <path d="M120 720H1570"/><path d="M120 820H1570"/>
    <path d="M180 90V860"/><path d="M300 90V860"/><path d="M420 90V860"/>
    <path d="M540 90V860"/><path d="M660 90V860"/><path d="M780 90V860"/>
    <path d="M900 90V860"/><path d="M1020 90V860"/><path d="M1140 90V860"/>
    <path d="M1260 90V860"/><path d="M1380 90V860"/><path d="M1500 90V860"/>
  </g>

  <!-- ÜST ETİKETİ BURADAN DEĞİŞTİR -->
  <text x="155" y="205" fill="#72E6D3" font-family="Arial, Helvetica, sans-serif"
